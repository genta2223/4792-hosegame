<html lang="ja">
<head>

    <title>どぅなん・ダッシュ！</title>
    <script src="https://cdn.jsdelivr.net/gh/kitao/pyxel@2.8.7/wasm/pyxel.js"></script>
</head>
<body style="background: #000; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh;">
    <script>
        // Use a physical .pyxapp file with a timestamp to bust cache
        const version = new Date().getTime();
        launchPyxel({
            command: "play",
            name: "4792hose.pyxapp?v=" + version,
            gamepad: "enabled"
        });
    </script>
</body>
